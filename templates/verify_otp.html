<!DOCTYPE html>
<html lang="en">
<head>
  <title>Verify OTP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #0056b3;
      color: white;
      border: none;
    }
  </style>
</head>

<body>
<div class="card">
  <h3>Enter OTP</h3>
  <form method="POST" action="/verify-otp">
    <input type="text" name="otp" placeholder="Enter OTP" required>
    <button type="submit">Verify</button>
  </form>
</div>
</body>
</html>
